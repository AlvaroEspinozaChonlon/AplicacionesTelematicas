<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff; /* Fondo blanco limpio */
            color: #1a1a1a;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        /* Contenedor de botones en fila */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            flex: 1; /* Para que midan lo mismo */
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Botón Iniciar Sesión (Derecha - Estilo Primario) */
        .login {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
        }

        .login:hover {
            background-color: #333333;
            transform: translateY(-2px);
        }

        /* Botón Registrarse (Izquierda - Estilo Secundario) */
        .register {
            background-color: transparent;
            color: #000000;
            border: 1px solid #e0e0e0;
        }

        .register:hover {
            background-color: #f5f5f5;
            border-color: #adadad;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bienvenido</h1>
        
        <div class="button-group">
            <button class="btn register" onclick="location.href='registro.jsp'">
                Registrarse
            </button>

            <button class="btn login" onclick="location.href='login.jsp'">
                Iniciar sesión
            </button>
            <button class="btn login" onclick="location.href='manager.jsp'">
                Entrar como gestor
            </button>
        </div>
    </div>

</body>
</html>
